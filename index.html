<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Mohammad Mahad — Founder, Norielix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #ffffff 0%, #f5f7fd 100%);
            color: #0b1e42;
            line-height: 1.7;
            padding: 48px 20px;
            min-height: 100vh;
        }
        .card {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e9eef2;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 8px 30px -8px rgba(0, 20, 40, 0.08);
        }
        #loading {
            text-align: center;
            color: #64748b;
            padding: 60px 0;
        }
        #loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #content { display: none; }
        #content h1 {
            color: #1e40af;
            text-align: center;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 28px;
        }
        #content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 24px 0;
        }
        #content ul {
            margin: 1.2rem 0 1.8rem 2rem;
        }
        #content ul li {
            margin-bottom: 0.6rem;
            list-style-type: disc;
        }
        #content strong { color: #1e40af; }
        #content a {
            color: #1e40af;
            text-decoration: none;
            border-bottom: 2px solid #e2e8f0;
        }
        #content a:hover { border-bottom-color: #1e40af; }
        .error-container {
            text-align: center;
            padding: 50px 20px;
        }
        .error-container .icon { font-size: 3rem; margin-bottom: 16px; }
        .error-container h3 { color: #dc2626; margin-bottom: 8px; }
        .error-container p { color: #94a3b8; }
        .retry-btn {
            margin-top: 20px;
            padding: 10px 32px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .retry-btn:hover { background: #1e3a8a; }
        @media (max-width: 640px) {
            body { padding: 24px 16px; }
            .card { padding: 28px 20px; }
            #content h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading profile</div>
        </div>
        <div id="content"></div>
    </div>

    <script>
        // =============================================
        // USING THE WORKING API DIRECTLY
        // =============================================
        // Your API is at /api/mahad.php and returns 200 OK
        const API_URL = 'https://www.norielix.com/api/mahad.php';
        
        // Fallback: corsproxy.io if the above doesn't work
        const FALLBACK_URL = 'https://corsproxy.io/?' + 
            encodeURIComponent('https://www.norielix.com/admin/api/mahad.php');
        
        async function loadProfile() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            
            loading.style.display = 'block';
            content.style.display = 'none';
            loading.innerHTML = `
                <div class="spinner"></div>
                <div>Loading profile</div>
            `;
            
            // Try both URLs
            const urls = [API_URL, FALLBACK_URL];
            
            for (let i = 0; i < urls.length; i++) {
                try {
                    const url = urls[i];
                    console.log(`📡 Attempt ${i + 1}/${urls.length}: ${url}`);
                    
                    const response = await fetch(url, {
                        cache: 'no-store',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        }
                    });
                    
                    if (!response.ok) {
                        console.log(`❌ Attempt ${i + 1} failed: HTTP ${response.status}`);
                        continue;
                    }
                    
                    const data = await response.json();
                    console.log('✅ Data received:', data);
                    
                    if (!data.title || !data.content) {
                        throw new Error('Incomplete data');
                    }
                    
                    document.title = data.title + ' | Norielix';
                    
                    let html = `<h1>${escapeHtml(data.title)}</h1>`;
                    if (data.image) {
                        html += `<img src="${escapeHtml(data.image)}" alt="${escapeHtml(data.title)}" loading="lazy">`;
                    }
                    html += data.content;
                    
                    content.innerHTML = html;
                    loading.style.display = 'none';
                    content.style.display = 'block';
                    
                    console.log('✅ Profile loaded successfully');
                    return;
                    
                } catch (error) {
                    console.error(`❌ Attempt ${i + 1} error:`, error.message);
                    if (i === urls.length - 1) {
                        loading.innerHTML = `
                            <div class="error-container">
                                <div class="icon">⚠️</div>
                                <h3>Failed to load profile</h3>
                                <p>Please refresh the page or try again later</p>
                                <button class="retry-btn" onclick="loadProfile()">
                                    🔄 Try Again
                                </button>
                            </div>
                        `;
                        loading.style.display = 'block';
                    }
                }
            }
        }
        
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
