<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahad Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        .frame-wrap {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            /* Add extra height to compensate for the cropped navbar */
            height: calc(100vh + 80px);
            border: none;
            display: block;
            /* Shift the iframe up to hide the top navbar (80px tall) */
            margin-top: -80px;
        }
    </style>
</head>
<body>
    <div class="frame-wrap">
        <iframe src="https://www.norielix.com/mahad" title="Mahad Profile">
            Your browser does not support iframes.
            <a href="https://www.norielix.com/mahad">Click here to view my profile</a>.
        </iframe>
    </div>
</body>
</html>
