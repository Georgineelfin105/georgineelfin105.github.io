    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body, #profile-container {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="profile-container"></div>

    <script>
        (async function() {
            const proxy = "https://corsproxy.io";
            const target = "https://norielix.com";
            const wrapper = document.getElementById("profile-container");
            
            try {
                const res = await fetch(proxy + encodeURIComponent(target));
                if (!res.ok) throw new Error();
                let html = await res.text();
                
                html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                
                const shadow = wrapper.attachShadow({ mode: 'open' });
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('a').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('//')) {
                        link.setAttribute('href', 'https://norielix.com' + (href.startsWith('/') ? '' : '/') + href);
                    }
                    link.setAttribute('target', '_top');
                });

                doc.querySelectorAll('img, link, script').forEach(el => {
                    ['src', 'href'].forEach(attr => {
                        const val = el.getAttribute(attr);
                        if (val && !val.startsWith('http') && !val.startsWith('//') && !val.startsWith('data:')) {
                            el.setAttribute(attr, 'https://norielix.com' + (val.startsWith('/') ? '' : '/') + val);
                        }
                    });
                });

                const base = document.createElement('base');
                base.href = "https://norielix.com/";
                shadow.appendChild(base);

                const styles = doc.querySelectorAll('link[rel="stylesheet"], style');
                styles.forEach(style => shadow.appendChild(style.cloneNode(true)));

                const contentWrapper = document.createElement('div');
                while (doc.body.firstChild) {
                    contentWrapper.appendChild(doc.body.firstChild);
                }
                shadow.appendChild(contentWrapper);

            } catch (err) {
                window.location.replace(target);
            }
        })();
    </script>
</body>
</html>
